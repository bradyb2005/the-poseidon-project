<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – Poseidon</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="card">
    <h1>🔱 Poseidon</h1>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button onclick="login()">Log In</button>

    <div class="message" id="message"></div>

    <div class="link">
      <a href="forgot_password.html">Forgot password?</a>
      &nbsp;·&nbsp;
      <a href="register.html">Create account</a>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    async function login() {
      // Grab what the user typed
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("message");

      // Basic check before even hitting the backend
      if (!username || !password) {
        showMessage(msg, "Please fill in all fields.", "error");
        return;
      }

      try {
        // Call your FastAPI backend
        const response = await fetch(`${API_BASE}/users/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Save the user info so other pages can use it
          localStorage.setItem("user", JSON.stringify(data.user));
          showMessage(msg, "Login successful! Redirecting...", "success");
          // Go to notifications page after login
          setTimeout(() => {
            window.location.href = "notifications.html";
          }, 1000);
        } else {
          showMessage(msg, data.detail || "Login failed.", "error");
        }

      } catch (err) {
        showMessage(msg, "Cannot reach server. Is the backend running?", "error");
      }
    }

    function showMessage(el, text, type) {
      el.textContent = text;
      el.className = `message ${type}`;
      el.style.display = "block";
    }

    // Allow pressing Enter to submit
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>

</body>
</html>
