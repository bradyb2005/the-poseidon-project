<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin – Poseidon</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      align-items: flex-start;
      padding: 0;
      background: #f0f2f5;
    }

    .admin-wrapper {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .admin-header {
      background: #1a1a2e;
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 12px;
      margin-bottom: 1.5rem;
    }

    .admin-header h1 {
      color: white;
      font-size: 1.3rem;
      margin: 0;
      text-align: left;
    }

    .admin-header a {
      color: #aac4ff;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      width: auto;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      background: white;
      color: #333;
      border: 2px solid #ddd;
      font-size: 0.95rem;
      cursor: pointer;
      margin: 0;
    }

    .tab-btn.active {
      background: #4f8ef7;
      color: white;
      border-color: #4f8ef7;
    }

    .tab-btn:hover:not(.active) {
      background: #f0f0f0;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
      max-width: 100%;
    }

    /* Dashboard */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: #f8f9ff;
      border-radius: 10px;
      padding: 1.2rem;
      text-align: center;
      border: 1px solid #e0e7ff;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: #4f8ef7;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.3rem;
    }

    /* Tables */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      background: #f0f4ff;
      padding: 0.75rem 1rem;
      text-align: left;
      color: #333;
      font-weight: bold;
      border-bottom: 2px solid #dde4ff;
    }

    td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid #f0f0f0;
      color: #444;
    }

    tr:hover td { background: #fafbff; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .badge-admin { background: #ffeaa7; color: #856404; }
    .badge-customer { background: #d4edda; color: #155724; }
    .badge-owner { background: #d1ecf1; color: #0c5460; }
    .badge-suspended { background: #f8d7da; color: #721c24; }
    .badge-active { background: #d4edda; color: #155724; }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      align-items: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .filter-group label {
      font-size: 0.8rem;
      font-weight: bold;
      color: #555;
    }

    .filter-group input,
    .filter-group select {
      padding: 0.45rem 0.7rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.85rem;
      width: auto;
    }

    .filter-group button {
      width: auto;
      padding: 0.45rem 1.2rem;
      font-size: 0.85rem;
      margin: 0;
      border-radius: 6px;
    }

    .btn-danger {
      background: #e55;
      color: white;
      border: none;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .btn-danger:hover { background: #c33; }

    .btn-warn {
      background: #f0ad4e;
      color: white;
      border: none;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .btn-warn:hover { background: #d98c2a; }

    .btn-sm {
      background: #4f8ef7;
      color: white;
      border: none;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .btn-sm:hover { background: #3a7de0; }

    .pagination {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .pagination button {
      width: auto;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      margin: 0;
      border-radius: 6px;
      background: #eee;
      color: #333;
    }

    .pagination button.active {
      background: #4f8ef7;
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #999;
    }

    .section-title {
      font-size: 1rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 1rem;
    }

    .top-list {
      list-style: none;
      padding: 0;
    }

    .top-list li {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.9rem;
    }

    .action-msg {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: green;
      display: none;
    }
  </style>
</head>
<body>

<div class="admin-wrapper">

  <div class="admin-header">
    <h1>🔱 Poseidon — Admin Panel</h1>
    <div>
      <span id="admin-name" style="color:#aac4ff; font-size:0.85rem; margin-right:1rem;"></span>
      <a href="login.html" onclick="logout()">Log out</a>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
    <button class="tab-btn" onclick="switchTab('users')">👥 Users</button>
    <button class="tab-btn" onclick="switchTab('orders')">📦 Orders</button>
    <button class="tab-btn" onclick="switchTab('analytics')">📈 Analytics</button>
  </div>

  <!-- DASHBOARD TAB -->
  <div class="tab-content active" id="tab-dashboard">
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-number">...</div><div class="stat-label">Loading</div></div>
    </div>
    <div class="card">
      <div class="section-title">🏆 Top Restaurants by Orders</div>
      <ul class="top-list" id="top-restaurants">
        <li>Loading...</li>
      </ul>
    </div>
  </div>

  <!-- USERS TAB -->
  <div class="tab-content" id="tab-users">
    <div class="card">
      <div class="filters">
        <div class="filter-group">
          <label>Search</label>
          <input type="text" id="user-search" placeholder="username or email">
        </div>
        <div class="filter-group">
          <label>Role</label>
          <select id="user-role">
            <option value="">All</option>
            <option value="customer">Customer</option>
            <option value="owner">Owner</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Status</label>
          <select id="user-suspended">
            <option value="">All</option>
            <option value="false">Active</option>
            <option value="true">Suspended</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Sort by</label>
          <select id="user-sort">
            <option value="username">Username</option>
            <option value="email">Email</option>
            <option value="id">ID</option>
          </select>
        </div>
        <div class="filter-group">
          <label>&nbsp;</label>
          <button onclick="loadUsers(1)">🔍 Search</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="6" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination" id="users-pagination"></div>
      <div class="action-msg" id="user-action-msg"></div>
    </div>
  </div>

  <!-- ORDERS TAB -->
  <div class="tab-content" id="tab-orders">
    <div class="card">
      <div class="filters">
        <div class="filter-group">
          <label>Customer ID</label>
          <input type="text" id="order-customer" placeholder="customer id">
        </div>
        <div class="filter-group">
          <label>Min Value ($)</label>
          <input type="number" id="order-min" placeholder="0">
        </div>
        <div class="filter-group">
          <label>Max Value ($)</label>
          <input type="number" id="order-max" placeholder="999">
        </div>
        <div class="filter-group">
          <label>Date From</label>
          <input type="date" id="order-date-from">
        </div>
        <div class="filter-group">
          <label>Date To</label>
          <input type="date" id="order-date-to">
        </div>
        <div class="filter-group">
          <label>Sort by</label>
          <select id="order-sort">
            <option value="order_time">Date</option>
            <option value="order_value">Value</option>
          </select>
        </div>
        <div class="filter-group">
          <label>&nbsp;</label>
          <button onclick="loadOrders(1)">🔍 Search</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer ID</th>
              <th>Item</th>
              <th>Restaurant</th>
              <th>Date</th>
              <th>Value</th>
              <th>Distance</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="7" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination" id="orders-pagination"></div>
    </div>
  </div>

  <!-- ANALYTICS TAB -->
  <div class="tab-content" id="tab-analytics">
    <div class="stats-grid" id="analytics-stats">
      <div class="stat-card"><div class="stat-number">...</div><div class="stat-label">Loading</div></div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
      <div class="card">
        <div class="section-title">📅 Orders by Month</div>
        <ul class="top-list" id="orders-by-month">
          <li>Loading...</li>
        </ul>
      </div>
      <div class="card">
        <div class="section-title">🏆 Top Restaurants</div>
        <ul class="top-list" id="analytics-top-restaurants">
          <li>Loading...</li>
        </ul>
      </div>
    </div>
  </div>

</div>

<script src="../js/api.js"></script>
<script>
  // ── Auth guard ───────────────────────────────────────────
  const user = JSON.parse(localStorage.getItem("user") || "null");
  if (!user) window.location.href = "login.html";

  document.getElementById("admin-name").textContent = `👤 ${user.username}`;

  function logout() { localStorage.removeItem("user"); }

  // ── Tab switching ────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(`tab-${name}`).classList.add("active");
    event.target.classList.add("active");

    if (name === "dashboard") loadDashboard();
    if (name === "users") loadUsers(1);
    if (name === "orders") loadOrders(1);
    if (name === "analytics") loadAnalytics();
  }

  // ── Dashboard ────────────────────────────────────────────
  async function loadDashboard() {
    try {
      const res = await fetch(`${API_BASE}/admin/analytics`);
      const d = await res.json();

      document.getElementById("stats-grid").innerHTML = `
        <div class="stat-card">
          <div class="stat-number">${d.total_users}</div>
          <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${d.suspended_users}</div>
          <div class="stat-label">Suspended</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${d.total_orders}</div>
          <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">$${d.total_revenue.toLocaleString()}</div>
          <div class="stat-label">Total Revenue</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">$${d.avg_order_value}</div>
          <div class="stat-label">Avg Order Value</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${d.total_notifications}</div>
          <div class="stat-label">Notifications</div>
        </div>
      `;

      document.getElementById("top-restaurants").innerHTML =
        d.top_restaurants.map((r, i) => `
          <li>
            <span>${i + 1}. Restaurant #${r.restaurant_id}</span>
            <span><strong>${r.order_count}</strong> orders</span>
          </li>
        `).join("") || "<li>No data</li>";

    } catch (err) {
      document.getElementById("stats-grid").innerHTML =
        '<div class="empty-state">⚠️ Could not load dashboard.</div>';
    }
  }

  // ── Users ────────────────────────────────────────────────
  let currentUserPage = 1;

  async function loadUsers(page) {
    currentUserPage = page;
    const search = document.getElementById("user-search").value.trim();
    const role = document.getElementById("user-role").value;
    const suspended = document.getElementById("user-suspended").value;
    const sortBy = document.getElementById("user-sort").value;

    let url = `${API_BASE}/admin/users?page=${page}&page_size=10&sort_by=${sortBy}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (role) url += `&role=${role}`;
    if (suspended !== "") url += `&is_suspended=${suspended}`;

    try {
      const res = await fetch(url);
      const d = await res.json();
      const tbody = document.getElementById("users-tbody");

      if (!d.users || d.users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No users found.</td></tr>';
        document.getElementById("users-pagination").innerHTML = "";
        return;
      }

      tbody.innerHTML = d.users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td><strong>${u.username}</strong></td>
          <td>${u.email}</td>
          <td><span class="badge badge-${u.role || 'customer'}">${u.role || 'customer'}</span></td>
          <td>
            <span class="badge ${u.is_suspended ? 'badge-suspended' : 'badge-active'}">
              ${u.is_suspended ? 'Suspended' : 'Active'}
            </span>
          </td>
          <td style="display:flex; gap:0.4rem; flex-wrap:wrap;">
            ${u.is_suspended
              ? `<button class="btn-sm" onclick="unsuspendUser('${u.id}')">✅ Unsuspend</button>`
              : `<button class="btn-warn" onclick="suspendUser('${u.id}')">⛔ Suspend</button>`
            }
            <button class="btn-danger" onclick="deleteUser('${u.id}')">🗑 Delete</button>
          </td>
        </tr>
      `).join("");

      renderPagination("users-pagination", d.total_pages, page, loadUsers);

    } catch (err) {
      document.getElementById("users-tbody").innerHTML =
        '<tr><td colspan="6" class="empty-state">⚠️ Could not load users.</td></tr>';
    }
  }

  async function suspendUser(id) {
    if (!confirm("Suspend this user?")) return;
    await fetch(`${API_BASE}/admin/users/${id}/suspend`, { method: "POST" });
    showActionMsg("user-action-msg", "User suspended!");
    loadUsers(currentUserPage);
  }

  async function unsuspendUser(id) {
    await fetch(`${API_BASE}/admin/users/${id}/unsuspend`, { method: "POST" });
    showActionMsg("user-action-msg", "User unsuspended!");
    loadUsers(currentUserPage);
  }

  async function deleteUser(id) {
    if (!confirm("Permanently delete this user? This cannot be undone.")) return;
    await fetch(`${API_BASE}/admin/users/${id}`, { method: "DELETE" });
    showActionMsg("user-action-msg", "User deleted.");
    loadUsers(currentUserPage);
  }

  // ── Orders ───────────────────────────────────────────────
  async function loadOrders(page) {
    const customerId = document.getElementById("order-customer").value.trim();
    const minVal = document.getElementById("order-min").value;
    const maxVal = document.getElementById("order-max").value;
    const dateFrom = document.getElementById("order-date-from").value;
    const dateTo = document.getElementById("order-date-to").value;
    const sortBy = document.getElementById("order-sort").value;

    let url = `${API_BASE}/admin/orders?page=${page}&page_size=15&sort_by=${sortBy}&sort_order=desc`;
    if (customerId) url += `&customer_id=${encodeURIComponent(customerId)}`;
    if (minVal) url += `&min_value=${minVal}`;
    if (maxVal) url += `&max_value=${maxVal}`;
    if (dateFrom) url += `&date_from=${dateFrom}`;
    if (dateTo) url += `&date_to=${dateTo}`;

    try {
      const res = await fetch(url);
      const d = await res.json();
      const tbody = document.getElementById("orders-tbody");

      if (!d.orders || d.orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No orders found.</td></tr>';
        document.getElementById("orders-pagination").innerHTML = "";
        return;
      }

      tbody.innerHTML = d.orders.map(o => `
        <tr>
          <td><code>${o.order_id}</code></td>
          <td style="font-size:0.8rem;">${o.customer_id}</td>
          <td>${o.item_name || "—"}</td>
          <td>#${o.restaurant_id}</td>
          <td>${o.order_time}</td>
          <td><strong>$${parseFloat(o.order_value).toFixed(2)}</strong></td>
          <td>${o.delivery_distance} km</td>
        </tr>
      `).join("");

      renderPagination("orders-pagination", d.total_pages, page, loadOrders);

    } catch (err) {
      document.getElementById("orders-tbody").innerHTML =
        '<tr><td colspan="7" class="empty-state">⚠️ Could not load orders.</td></tr>';
    }
  }

  // ── Analytics ────────────────────────────────────────────
  async function loadAnalytics() {
    try {
      const res = await fetch(`${API_BASE}/admin/analytics`);
      const d = await res.json();

      document.getElementById("analytics-stats").innerHTML = `
        <div class="stat-card">
          <div class="stat-number">${d.total_orders.toLocaleString()}</div>
          <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">$${d.total_revenue.toLocaleString()}</div>
          <div class="stat-label">Total Revenue</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">$${d.avg_order_value}</div>
          <div class="stat-label">Avg Order Value</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${d.total_users}</div>
          <div class="stat-label">Total Users</div>
        </div>
      `;

      document.getElementById("orders-by-month").innerHTML =
        d.orders_by_month.slice(-12).reverse().map(m => `
          <li>
            <span>${m.month}</span>
            <strong>${m.count} orders</strong>
          </li>
        `).join("") || "<li>No data</li>";

      document.getElementById("analytics-top-restaurants").innerHTML =
        d.top_restaurants.map((r, i) => `
          <li>
            <span>${i + 1}. Restaurant #${r.restaurant_id}</span>
            <strong>${r.order_count} orders</strong>
          </li>
        `).join("") || "<li>No data</li>";

    } catch (err) {
      document.getElementById("analytics-stats").innerHTML =
        '<div class="empty-state">⚠️ Could not load analytics.</div>';
    }
  }

  // ── Helpers ──────────────────────────────────────────────
  function renderPagination(containerId, totalPages, currentPage, loadFn) {
    const container = document.getElementById(containerId);
    if (totalPages <= 1) { container.innerHTML = ""; return; }

    let html = "";
    
    if (currentPage > 3) {
      html += `<button onclick="${loadFn.name}(1)">1</button>`;
      if (currentPage > 4) html += `<span style="padding:0.4rem">...</span>`;
    }

    for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
      html += `<button class="${i === currentPage ? 'active' : ''}"
        onclick="${loadFn.name}(${i})">${i}</button>`;
    }

    if (currentPage < totalPages - 2) {
      if (currentPage < totalPages - 3) html += `<span style="padding:0.4rem">...</span>`;
      html += `<button onclick="${loadFn.name}(${totalPages})">${totalPages}</button>`;
    }

    container.innerHTML = html;
  }

  function showActionMsg(id, text) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 3000);
  }

  // ── Load dashboard on open ───────────────────────────────
  loadDashboard();
</script>

</body>
</html>
