name: Move PR and Issue to In Review

on:
  pull_request:
    types: [opened, reopened]

jobs:
  move_to_review:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the Linked Issue ID
      - name: Get linked issue
        id: get-issue
        uses: tesseris/get-linked-issue-action@v1.1.0
        with:
          github-token: ${{ secrets.PROJECT_PAT }}

      # 2. Move the Pull Request (Your existing logic)
      - name: Move PR to In Review
        uses: leonsteinhaeuser/project-beta-automations@v2.2.1
        with:
          gh_token: ${{ secrets.PROJECT_PAT }}
          user: ${{ github.repository_owner }}
          project_id: 1
          resource_node_id: ${{ github.event.pull_request.node_id }}
          status_value: "In review"

      # 3. Move the Linked Issue (The fix)
      - name: Move Issue to In Review
        if: steps.get-issue.outputs.issue_node_id != ''
        uses: leonsteinhaeuser/project-beta-automations@v2.2.1
        with:
          gh_token: ${{ secrets.PROJECT_PAT }}
          user: ${{ github.repository_owner }}
          project_id: 1
          resource_node_id: ${{ steps.get-issue.outputs.issue_node_id }}
          status_value: "In review"
